<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <style>
    body {
        font-family: sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 10px;
    }

    /* style the box/window */
    .frame-box {
      width: 100%;
      max-width: 1000px;
      height: 60vh; /* Responsive height */
      min-height: 400px;
      border: 4px solid #333;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      margin: 0 auto;
    }

    /* --- SNES CONTROLLER STYLES --- */
    #touch-controls {
      display: none; /* Hidden by default, shown by JS if touch is detected */
      justify-content: space-between;
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
      user-select: none; /* Prevents text selection while mashing buttons */
    }

    /* D-Pad (Cross Layout using CSS Grid) */
    .d-pad {
      display: grid;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      gap: 4px;
    }

    .btn-dir {
      background-color: #444;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 24px;
      touch-action: none; /* Prevents browser handling like scrolling */
    }
    .btn-dir:active, .btn-dir.active-btn { background-color: #777; }

    .up    { grid-column: 2; grid-row: 1; border-radius: 8px 8px 0 0; }
    .left  { grid-column: 1; grid-row: 2; border-radius: 8px 0 0 8px; }
    .right { grid-column: 3; grid-row: 2; border-radius: 0 8px 8px 0; }
    .down  { grid-column: 2; grid-row: 3; border-radius: 0 0 8px 8px; }
    .center-pad { grid-column: 2; grid-row: 2; background-color: #444; } /* Fills the middle of the D-pad */

    /* Action Buttons (Diamond Layout using CSS Grid) */
    .action-buttons {
      display: grid;
      grid-template-columns: 65px 65px 65px;
      grid-template-rows: 65px 65px 65px;
      gap: 5px;
    }

    .btn-action {
      border: none;
      border-radius: 50%;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 6px 0 #222;
      touch-action: none;
      transition: transform 0.05s, box-shadow 0.05s;
    }
    
    .btn-action:active, .btn-action.active-btn {
      transform: translateY(6px);
      box-shadow: 0 0px 0 #222;
    }

    /* Super Famicom Colors */
    .x { grid-column: 2; grid-row: 1; background-color: #007bff; } /* Blue */
    .y { grid-column: 1; grid-row: 2; background-color: #28a745; } /* Green */
    .a { grid-column: 3; grid-row: 2; background-color: #dc3545; } /* Red */
    .b { grid-column: 2; grid-row: 3; background-color: #ffc107; color: #333;} /* Yellow */

  </style>
  <title>Oyun</title>
  <script>
    const keyMap = {
    'up': ' ',      // Space (starts question)
    'a': '1',       // Button 1
    'b': '2',       // Button 2
    'x': '3',       // Button 3
    'y': '4',       // Button 4
    'down': ' ',    // Also Space for convenience
    'left': 'r',    // Reset key for win screen
    'right': ' '
    };

    function simulateKey(buttonId, eventType) {
        const key = keyMap[buttonId];
        if (!key) return;

        // Construct the event data
        const eventData = {
            type: eventType, // 'keydown' or 'keyup'
            key: key,
            code: key === ' ' ? 'Space' : `Digit${key}`,
            keyboardSim: true
        };

        // Find your iframe and send the message
        const gameFrame = document.querySelector('iframe');
        gameFrame.contentWindow.postMessage(eventData, '*');
    }
  </script>
</head>
<body>
  <h1 style="text-align: center;">Coğrafya Bulmaca Oyunu - <span id="touch-test">a</span> </h1>
    <div style="display: flex; justify-content: center;">
        <div class="frame-box">
            <iframe src="game.html" width="100%" height="100%" frameborder="0" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
    </div> 
    <div id="touch-controls">
        <div class="d-pad">
            <button class="btn-dir up control-btn" id="up">▲</button>
            <button class="btn-dir left control-btn" id="left">◀</button>
            <div class="center-pad"></div>
            <button class="btn-dir right control-btn" id="right">▶</button>
            <button class="btn-dir down control-btn" id="down">▼</button>
        </div>
        <div class="action-buttons">
            <button class="btn-action x control-btn" id="x">X</button>
            <button class="btn-action y control-btn" id="y">Y</button>
            <button class="btn-action a control-btn" id="a">A</button>
            <button class="btn-action b control-btn" id="b">B</button>
        </div>
    </div>
    <script>
        const testShow = document.getElementById('touch-test');
        const touchControls = document.getElementById('touch-controls');
        let touch = "No touch";

        // Enhanced Touch Detection
        function getOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator?.userAgentData?.platform || window.navigator.platform;
            const iosPlatforms = ["iPhone", "iPad", "iPod"];

            // Check OS strings OR check if the browser actually supports touch events
            if (iosPlatforms.indexOf(platform) !== -1 || /Android/.test(userAgent) || 'ontouchstart' in window || navigator.maxTouchPoints > 0) {
                touch = "Touch";
            }
            return touch;
        }

        testShow.innerHTML = getOS();

        // Show the controller if touch is detected
        if (touch === "Touch") {
            touchControls.style.display = "flex";
        }

        // --- CONTROLLER LOGIC ---
        const gameFrame = document.getElementById('game-frame');
        const controlButtons = document.querySelectorAll('.control-btn');

        // Function to send inputs to the iframe
        function sendInputToGame(buttonId, state) {
            // 'state' will be 'pressed' or 'released'
            gameFrame.contentWindow.postMessage(
                { button: buttonId, action: state }, 
                '*' // Ideally, replace '*' with your actual domain for security
            );
        }

        // Attach events to all 8 buttons
        controlButtons.forEach(btn => {
            
            // Touch Events (For Mobile)
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Stop double-tap zoom or scrolling
                btn.classList.add('active-btn');
                sendInputToGame(btn.id, 'pressed');
            });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active-btn');
                sendInputToGame(btn.id, 'released');
            });

            // Mouse Events (For testing the buttons on a Desktop PC)
            btn.addEventListener('mousedown', () => {
                btn.classList.add('active-btn');
                sendInputToGame(btn.id, 'pressed');
            });

            btn.addEventListener('mouseup', () => {
                btn.classList.remove('active-btn');
                sendInputToGame(btn.id, 'released');
            });

            btn.addEventListener('mouseleave', () => {
                btn.classList.remove('active-btn');
                sendInputToGame(btn.id, 'released');
            });
        });
    </script>
</body>
</html>
