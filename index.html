<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oyun</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
    .frame-box {
      width: 100%; max-width: 2000px; height: 60vh; min-height: 500px;
      border: 4px solid #333; border-radius: 8px; overflow: hidden;
      background: #000; margin: 0 auto;
    }
    #touch-controls {
      display: none; justify-content: space-between;
      max-width: 800px; margin: 20px auto; padding: 0 20px; user-select: none;
    }
    .d-pad {
      display: grid; grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px; gap: 4px;
    }
    .btn-dir {
      background-color: #444; color: #fff; border: none;
      border-radius: 8px; font-size: 24px; touch-action: none; cursor: pointer;
    }
    .btn-dir:active, .btn-dir.active-btn { background-color: #777; }
    .up    { grid-column: 2; grid-row: 1; border-radius: 8px 8px 0 0; }
    .left  { grid-column: 1; grid-row: 2; border-radius: 8px 0 0 8px; }
    .right { grid-column: 3; grid-row: 2; border-radius: 0 8px 8px 0; }
    .down  { grid-column: 2; grid-row: 3; border-radius: 0 0 8px 8px; }
    .center-pad { grid-column: 2; grid-row: 2; background-color: #444; }
    .action-buttons {
      display: grid; grid-template-columns: 65px 65px 65px;
      grid-template-rows: 65px 65px 65px; gap: 5px;
    }
    .btn-action {
      border: none; border-radius: 50%; font-size: 22px; font-weight: bold;
      color: #fff; box-shadow: 0 6px 0 #222; touch-action: none;
      transition: transform 0.05s, box-shadow 0.05s; cursor: pointer;
    }
    .btn-action:active, .btn-action.active-btn {
      transform: translateY(6px); box-shadow: 0 0px 0 #222;
    }
    .btn-spc { grid-column: 2; grid-row: 1; background-color: #007bff; font-size: 12px; }
    .btn-1   { grid-column: 1; grid-row: 2; background-color: #28a745; }
    .btn-2   { grid-column: 3; grid-row: 2; background-color: #dc3545; }
    .btn-3   { grid-column: 2; grid-row: 3; background-color: #ffc107; color: #333; }
    .btn-4   { grid-column: 2; grid-row: 2; background-color: #6f42c1; }
    .hint-text { text-align: center; color: #555; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Bilgi Yarışması Oyunu</h1>

  <div class="frame-box">
    <iframe id="game-frame" src="game.html" width="100%" height="100%"
      frameborder="0" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

  <p class="hint-text" id="hint-desktop">
    Klavye: <b>SPACE</b> = Soru al &nbsp;|&nbsp; <b>1 2 3 4</b> = Cevapla &nbsp;|&nbsp; <b>
  </p>

  <div id="touch-controls">
    <div class="d-pad">
      <button class="btn-dir up   control-btn" id="key-space"  title="Soru / Devam">▲</button>
      <button class="btn-dir left control-btn" id="key-r"      title="Yeniden başlat">◀</button>
      <div class="center-pad"></div>
      <button class="btn-dir right control-btn" id="key-space2" title="Soru / Devam">▶</button>
      <button class="btn-dir down  control-btn" id="key-space3" title="Devam">▼</button>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;align-self:center;">
      <div style="font-size:12px;color:#555;">Şıklar</div>
      <div class="action-buttons">
        <button class="btn-action btn-spc control-btn" id="key-space4" title="Soru / Devam">SPC</button>
        <button class="btn-action btn-1   control-btn" id="key-1" title="Şık 1">1</button>
        <button class="btn-action btn-4   control-btn" id="key-4" title="Şık 4">4</button>
        <button class="btn-action btn-2   control-btn" id="key-2" title="Şık 2">2</button>
        <button class="btn-action btn-3   control-btn" id="key-3" title="Şık 3">3</button>
      </div>
    </div>
  </div>

  <script>
    // Key mapping: button ID → KeyboardEvent fields
    const keyMap = {
      'key-space':  { key: ' ', code: 'Space'  },
      'key-space2': { key: ' ', code: 'Space'  },
      'key-space3': { key: ' ', code: 'Space'  },
      'key-space4': { key: ' ', code: 'Space'  },
      'key-r':      { key: 'r', code: 'KeyR'   },
      'key-1':      { key: '1', code: 'Digit1' },
      'key-2':      { key: '2', code: 'Digit2' },
      'key-3':      { key: '3', code: 'Digit3' },
      'key-4':      { key: '4', code: 'Digit4' },
    };

    const frame = document.getElementById('game-frame');

    function sendKey(btnId, eventType) {
      const m = keyMap[btnId];
      if (!m) return;
      // This matches exactly what game.html's message listener expects
      frame.contentWindow.postMessage({
        keyboardSim: true,
        type: eventType,   // 'keydown' or 'keyup'
        key: m.key,
        code: m.code
      }, '*');
    }

    // Show touch controls on touch-capable devices
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) {
      document.getElementById('touch-controls').style.display = 'flex';
      document.getElementById('hint-desktop').style.display  = 'none';
    }

    document.querySelectorAll('.control-btn').forEach(btn => {
      const id = btn.id;

      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        btn.classList.add('active-btn');
        sendKey(id, 'keydown');
      }, { passive: false });

      btn.addEventListener('touchend', e => {
        e.preventDefault();
        btn.classList.remove('active-btn');
        sendKey(id, 'keyup');
      }, { passive: false });

      btn.addEventListener('mousedown', () => {
        btn.classList.add('active-btn');
        sendKey(id, 'keydown');
      });

      btn.addEventListener('mouseup', () => {
        btn.classList.remove('active-btn');
        sendKey(id, 'keyup');
      });

      btn.addEventListener('mouseleave', () => {
        btn.classList.remove('active-btn');
        sendKey(id, 'keyup');
      });
    });
  </script>
</body>
</html>
