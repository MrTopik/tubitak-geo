<!-- parent.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Oyun</title>
  <style>
    /* style the box/window */
    .frame-box {
      width: 1000px;
      height: 800px;
      border: 2px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center;">Coğrafya Bulmaca Oyunu - <span id="touch-test">a</span> </h1>
    <script>
        const userOs = document.querySelector(".os");
        const testShow = document.getElementById('touch-test')

        let touch = "No touch";

        function getOS() {
        const userAgent = window.navigator.userAgent;
        const platform =
            window.navigator?.userAgentData?.platform || window.navigator.platform;
        const macosPlatforms = ["Macintosh", "MacIntel", "MacPPC", "Mac68K"];
        const windowsPlatforms = ["Win32", "Win64", "Windows", "WinCE"];
        const iosPlatforms = ["iPhone", "iPad", "iPod"];

        if (iosPlatforms.indexOf(platform) !== -1 || /Android/.test(userAgent)) {
            touch = "Touch";
        }

        return touch;
        }

        getOS();

        testShow.innerHTML = getOS();
    </script>
    <div style="display: flex; justify-content: center;">
        <div class="frame-box">
            <iframe src="game.html" width="100%" height="100%" frameborder="0" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
    </div> 
</body>
</html>
