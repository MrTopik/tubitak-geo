<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oyun</title>
  <script src="pwabuilder-sw.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
    
    #fullscreen-wrapper {
      position: relative;
      background: #000;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .frame-box {
      flex-grow: 1; 
      width: 100%;
      overflow: hidden;
    }

    .ios-fs-fix {
      position: fixed !important;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99999;
      height: 100vh !important;
    }

    #touch-controls {
      display: flex;
      user-select: none;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 65px 65px 65px;
      grid-template-rows: 65px 65px 65px;
      gap: 5px;
      position: absolute; /* Changed from fixed */
      right: 10px;
      bottom: 10px;
      opacity: 0.7;
      z-index: 100;
    }

    .btn-action {
      border: none; border-radius: 50%; font-size: 22px; font-weight: bold;
      color: #fff; box-shadow: 0 4px 0 #222; touch-action: none;
      transition: transform 0.05s; cursor: pointer;
    }
    .btn-action:active { transform: translateY(4px); box-shadow: 0 0px 0 #222; }

    .btn-spc { grid-column: 2; grid-row: 1; background-color: #007bff; font-size: 12px; }
    .btn-5   { grid-column: 3; grid-row: 1; background-color: aqua; color: #000; font-size: 12px;}
    .btn-1   { grid-column: 1; grid-row: 2; background-color: #28a745; }
    .btn-2   { grid-column: 2; grid-row: 2; background-color: #dc3545; }
    .btn-3   { grid-column: 3; grid-row: 2; background-color: #ffc107; color: #333; }
    .btn-4   { grid-column: 2; grid-row: 3; background-color: #6f42c1; }
    .btn-r   { grid-column: 1; grid-row: 1; background-color: crimson; color: white; font-size: 12px;}

    .hint-text { text-align: center; color: #555; font-size: 13px; padding: 10px; }
  </style>
</head>
<body>
  <div id="fullscreen-wrapper">
    <div class="frame-box">
      <iframe id="game-frame" src="game.html" width="100%" height="100%"
        frameborder="0" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

    <div id="touch-controls">
        <div class="action-buttons">
          <button class="btn-action btn-r control-btn" id="key-r">Yeniden Başlat</button>
          <button class="btn-action btn-spc control-btn" id="key-space4">Devam</button>
          <button class="btn-action btn-5 control-btn" id="key-fs">Tam Ekran</button>
          <button class="btn-action btn-1 control-btn" id="key-1">1</button>
          <button class="btn-action btn-2 control-btn" id="key-2">2</button>
          <button class="btn-action btn-3 control-btn" id="key-3">3</button>
          <button class="btn-action btn-4 control-btn" id="key-4">4</button>
        </div>
    </div>
  </div>

  <p class="hint-text">Klavye: SPACE | 1 2 3 4</p>
  <p style="text-align: center;">ATP-9/A sınıfından Toprak Tarık Kaplanoğlu, Kuzey Mehmet Taşçı ve Ali Tuğrul Sarı tarafından yapılmıştır.</p>
  <script>
    const keyMap = {
      'key-space4': { key: ' ', code: 'Space'  },
      'key-r':      { key: 'r', code: 'KeyR'   },
      'key-1':      { key: '1', code: 'Digit1' },
      'key-2':      { key: '2', code: 'Digit2' },
      'key-3':      { key: '3', code: 'Digit3' },
      'key-4':      { key: '4', code: 'Digit4' },
    };

    const frame = document.getElementById('game-frame');
    const wrapper = document.getElementById('fullscreen-wrapper');
    const fsBtn = document.getElementById('key-fs');

    function sendKey(btnId, eventType) {
      const m = keyMap[btnId];
      if (!m) return;
      frame.contentWindow.postMessage({
        keyboardSim: true,
        type: eventType,
        key: m.key,
        code: m.code
      }, '*');
    }

    fsBtn.addEventListener('click', () => {
      const isFullscreen = document.fullscreenElement || 
                           document.webkitFullscreenElement || 
                           wrapper.classList.contains('ios-fs-fix');

      if (!isFullscreen) {
          if (wrapper.requestFullscreen) {
              wrapper.requestFullscreen();
          } else if (wrapper.webkitRequestFullscreen) {
              wrapper.webkitRequestFullscreen();
          } else {
              wrapper.classList.add('ios-fs-fix');
          }
      } else {
          if (document.exitFullscreen) {
              document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
              document.webkitExitFullscreen();
          }
          wrapper.classList.remove('ios-fs-fix');
      }
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            wrapper.classList.remove('ios-fs-fix');
        }
    });

    document.querySelectorAll('.control-btn').forEach(btn => {
      const id = btn.id;
      if (id === 'key-fs') return; // Don't send keystrokes for FS button

      // Use pointer events for better cross-platform support
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        sendKey(id, 'keydown');
      });

      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        sendKey(id, 'keyup');
      });
      
      btn.addEventListener('pointerleave', () => sendKey(id, 'keyup'));
    });
  </script>
</body>
</html>
